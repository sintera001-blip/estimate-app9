<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="見積アプリ">
<meta name="theme-color" content="#ffffff">
<title>見積アプリ</title>
<style>
  :root {
    --primary: #1a73e8;
    --primary-bg: #e8f0fe;
    --danger: #d93025;
    --danger-bg: #fce8e6;
    --success: #188038;
    --success-bg: #e6f4ea;
    --border: #e0e0e0;
    --text: #202124;
    --muted: #5f6368;
    --hint: #9aa0a6;
    --bg: #f8f9fa;
    --card: #ffffff;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --primary: #8ab4f8;
      --primary-bg: #1a2744;
      --border: #3c4043;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --hint: #5f6368;
      --bg: #202124;
      --card: #292a2d;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; padding-bottom: 80px; }
  .tab-bar { background: var(--card); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding-bottom: env(safe-area-inset-bottom); }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 4px; font-size: 11px; color: var(--hint); cursor: pointer; border: none; background: transparent; }
  .tab-item.active { color: var(--primary); }
  .tab-item svg { width: 24px; height: 24px; }

  /* Cards */
  .card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
  .card-title { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Form */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 5px; }
  input[type=text], input[type=number], input[type=date], textarea, select {
    width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 16px; color: var(--text); background: var(--bg); outline: none; appearance: none; -webkit-appearance: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
  textarea { resize: none; min-height: 80px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Items */
  .items-list { display: flex; flex-direction: column; gap: 10px; }
  .item-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
  .item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .item-top input { flex: 1; }
  .item-nums { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 6px; }
  .item-subtotal { text-align: right; font-size: 14px; font-weight: 600; color: var(--primary); }
  .btn-del { width: 36px; height: 36px; min-width: 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--card); color: var(--muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  /* Totals */
  .totals { border-top: 1px solid var(--border); padding-top: 14px; margin-top: 4px; }
  .total-row { display: flex; justify-content: space-between; align-items: center; font-size: 15px; margin-bottom: 8px; }
  .total-row.grand { font-size: 20px; font-weight: 700; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; color: var(--primary); }
  .tax-select { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .tax-select label { margin: 0; white-space: nowrap; }
  .tax-select select { width: auto; }

  /* Buttons */
  .btn { padding: 13px 20px; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; border: none; width: 100%; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-add { background: var(--primary-bg); color: var(--primary); border: none; border-radius: var(--radius-sm); padding: 12px; font-size: 15px; font-weight: 600; width: 100%; cursor: pointer; }
  .actions { display: flex; gap: 10px; }
  .actions .btn { flex: 1; }

  /* History */
  .history-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .history-card:active { opacity: 0.7; }
  .hc-left .client { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .hc-left .date { font-size: 12px; color: var(--hint); }
  .hc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .hc-amount { font-size: 16px; font-weight: 700; color: var(--primary); }
  .btn-del-hist { font-size: 12px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--hint); cursor: pointer; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--hint); font-size: 15px; }

  .history-tools { display:flex; gap:10px; margin-bottom:12px; }
  .history-tools .btn { width:auto; flex:1; }
  .history-note { font-size:12px; color: var(--hint); margin-bottom: 10px; }
  .status-chip { display:inline-block; font-size:11px; padding:3px 8px; border-radius:999px; background: var(--primary-bg); color: var(--primary); margin-bottom: 6px; }
  .history-meta { font-size: 12px; color: var(--hint); margin-top: 2px; }

  /* Toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #323232; color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1 id="header-title">見積入力</h1>
    <button id="header-btn" onclick="newEstimate()" style="background:transparent;border:none;color:var(--primary);font-size:15px;font-weight:600;cursor:pointer;padding:4px 8px;">新規</button>
  </div>
  <div class="content" id="content"></div>
  <div class="tab-bar">
    <button class="tab-item active" id="tab-form-btn" onclick="switchTab('form')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      入力
    </button>
    <button class="tab-item" id="tab-history-btn" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="tab-history-label">履歴</span>
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const WEB_APP_URL ="https://script.google.com/macros/s/AKfycbxS8RWgf0hkFVaR3OscHGkNDHDuaqfbNouNe97-8NCg8Sx1FuchQ5TxX-dVSKVmNCVA/exec";
let currentTab = 'form';
let items = [];
let estimates = [];
let remoteEstimates = [];
let historyLoading = false;
let historyError = '';
let currentHistorySource = 'local';
let editingRecordId = '';
let editingRecordSource = '';

try { estimates = JSON.parse(localStorage.getItem('est_v2') || '[]'); } catch(e) {}

function fmt(n) { return '¥' + Math.round(Number(n) || 0).toLocaleString('ja-JP'); }
function hasWebAppUrl() { return WEB_APP_URL && !WEB_APP_URL.includes('PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE'); }
function getActiveHistoryRecords() { return currentHistorySource === 'remote' ? remoteEstimates : estimates; }
function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function isEditingRemote() { return editingRecordSource === 'remote' && !!editingRecordId; }
function updatePhoneLink() {
  const phoneInput = document.getElementById('phone');
  const phoneLink = document.getElementById('phone-link');
  if (!phoneInput || !phoneLink) return;
  const raw = phoneInput.value || '';
  const dial = raw.replace(/[^\d+]/g, '');
  phoneLink.href = dial ? `tel:${dial}` : '#';
  phoneLink.style.pointerEvents = dial ? 'auto' : 'none';
  phoneLink.style.opacity = dial ? '1' : '.5';
}
function getSaveButtonLabel() { return isEditingRemote() ? '更新' : '保存'; }
function getEditStatusHtml() {
  if (!isEditingRemote()) return '';
  return `<div class="card" style="border-color:var(--primary);background:var(--primary-bg);">
    <div class="card-title" style="color:var(--primary);margin-bottom:6px;">編集中</div>
    <div style="font-size:14px;">クラウド履歴の見積を編集中です。保存するとスプレッドシートの同じ行を更新します。</div>
  </div>`;
}
function clearEditingState() {
  editingRecordId = '';
  editingRecordSource = '';
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-form-btn').classList.toggle('active', tab === 'form');
  document.getElementById('tab-history-btn').classList.toggle('active', tab === 'history');
  document.getElementById('header-title').textContent = tab === 'form' ? '見積入力' : '履歴';
  document.getElementById('header-btn').style.display = tab === 'form' ? '' : 'none';
  render();
}

function newEstimate() {
  if (!confirm('入力中の内容をクリアして新規作成しますか？')) return;
  clearEditingState();
  items = [{ id: 1, name: '', place: '', qty: 1, price: '' }];
  render();
  document.getElementById('client').value = '';
  document.getElementById('clientAddress').value = '';
  document.getElementById('serviceClient').value = '';
  document.getElementById('serviceAddress').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('email').value = '';
  document.getElementById('staff').value = '';
  document.getElementById('workDate').value = '';
  document.getElementById('workTime').value = '';
  document.getElementById('expiry').value = '';
  document.getElementById('notes').value = '';
  calcTotals();
}

function render() {
  if (currentTab === 'form') renderForm();
  else renderHistory();
  updateHistoryBadge();
}

function renderForm() {
  const c = document.getElementById('content');
  const savedClient = document.getElementById && document.getElementById('client') ? document.getElementById('client').value : '';
  const savedClientAddress = document.getElementById && document.getElementById('clientAddress') ? document.getElementById('clientAddress').value : '';
  const savedServiceClient = document.getElementById && document.getElementById('serviceClient') ? document.getElementById('serviceClient').value : '';
  const savedServiceAddress = document.getElementById && document.getElementById('serviceAddress') ? document.getElementById('serviceAddress').value : '';
  const savedPhone = document.getElementById && document.getElementById('phone') ? document.getElementById('phone').value : '';
  const savedEmail = document.getElementById && document.getElementById('email') ? document.getElementById('email').value : '';
  const savedStaff = document.getElementById && document.getElementById('staff') ? document.getElementById('staff').value : '';
  const savedWorkDate = document.getElementById && document.getElementById('workDate') ? document.getElementById('workDate').value : '';
  const savedWorkTime = document.getElementById && document.getElementById('workTime') ? document.getElementById('workTime').value : '';
  const savedExpiry = document.getElementById && document.getElementById('expiry') ? document.getElementById('expiry').value : '';
  const savedNotes = document.getElementById && document.getElementById('notes') ? document.getElementById('notes').value : '';

  c.innerHTML = `
    ${getEditStatusHtml()}
    <div class="card">
      <div class="card-title">基本情報</div>
      <div class="field"><label>ご契約お客様名</label><input type="text" id="client" placeholder="株式会社〇〇 御中" value="${savedClient}"></div>
      <div class="field"><label>ご契約お客様住所</label><input type="text" id="clientAddress" placeholder="ご契約先住所を入力" value="${savedClientAddress}"></div>
      <div class="field"><label>サービス先お客様名</label><input type="text" id="serviceClient" placeholder="サービス提供先名を入力" value="${savedServiceClient}"></div>
      <div class="field"><label>サービス先住所</label><input type="text" id="serviceAddress" placeholder="サービス先住所を入力" value="${savedServiceAddress}"></div>
      <div class="row2">
        <div class="field"><label>電話番号</label><input type="text" id="phone" placeholder="090-1234-5678" value="${savedPhone}"><div style="margin-top:6px;font-size:12px;color:var(--muted);">
          <a id="phone-link" href="${savedPhone ? 'tel:' + String(savedPhone).replace(/[^\d+]/g,'') : '#'}" style="color:var(--primary);text-decoration:none;pointer-events:${savedPhone ? 'auto' : 'none'};opacity:${savedPhone ? '1' : '.5'};">電話をかける</a>
        </div></div>
        <div class="field"><label>見積担当者</label><input type="text" id="staff" placeholder="担当者名を入力" value="${savedStaff}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>作業日</label><input type="date" id="workDate" value="${savedWorkDate}"></div>
        <div class="field"><label>作業時間</label><input type="text" id="workTime" placeholder="例：9:00〜12:00" value="${savedWorkTime}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>メールアドレス</label><input type="text" id="email" placeholder="example@example.com" value="${savedEmail}"></div>
        <div class="field"><label>有効期限</label><input type="date" id="expiry" value="${savedExpiry}"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">明細</div>
      <div class="items-list" id="items-list"></div>
      <button class="btn-add" onclick="addItem()" style="margin-top:10px;">＋ 品目を追加</button>
      <div class="totals">
        <div class="total-row"><span style="color:var(--muted)">税抜金額</span><span id="t-sub">¥0</span></div>
        <div class="total-row"><span id="t-taxlabel" style="color:var(--muted)">内消費税（10%）</span><span id="t-tax">¥0</span></div>
        <div class="total-row grand"><span>税込合計</span><span id="t-grand">¥0</span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">備考・メモ</div>
      <textarea id="notes" placeholder="支払条件、納期など">${savedNotes}</textarea>
    </div>

    <div class="actions" style="margin-bottom:8px">
      <button class="btn btn-secondary" onclick="saveEstimate()">${getSaveButtonLabel()}</button>
      <button class="btn btn-primary" onclick="printEstimate()">PDF出力</button>
    </div>
  `;

  renderItems();
  calcTotals();
  const phoneInput = document.getElementById('phone');
  const phoneLink = document.getElementById('phone-link');
  if (phoneInput && phoneLink) {
    updatePhoneLink();
    phoneInput.addEventListener('input', updatePhoneLink);
    phoneInput.addEventListener('change', updatePhoneLink);
  }
}

function renderItems() {
  const list = document.getElementById('items-list');
  if (!list) return;
  list.innerHTML = items.map((item, idx) => `
    <div class="item-card">
      <div class="item-top">
        <input type="text" placeholder="品名" value="${item.name}" oninput="updateItem(${idx},'name',this.value)" style="flex:1">
        <button class="btn-del" onclick="removeItem(${idx})">×</button>
      </div>
      <div class="field" style="margin:0 0 8px 0"><label>サービス箇所</label><input type="text" value="${item.place || ''}" oninput="updateItem(${idx},'place',this.value)"></div>
      <div class="item-nums">
        <div class="field" style="margin:0"><label>数量</label><input type="number" min="0" step="1" value="${item.qty}" oninput="updateItem(${idx},'qty',this.value)"></div>
        <div class="field" style="margin:0"><label>単価（税込）</label><input type="number" min="0" step="1" value="${item.price || ''}" oninput="updateItem(${idx},'price',this.value)"></div>
      </div>
      <div class="item-subtotal">${fmt(item.qty * item.price)}</div>
    </div>
  `).join('');
}

function updateItem(idx, field, val) {
  items[idx][field] = (field === 'name' || field === 'place') ? val : (parseFloat(val) || 0);
  const list = document.getElementById('items-list');
  if (list) {
    const cards = list.querySelectorAll('.item-card');
    if (cards[idx]) {
      cards[idx].querySelector('.item-subtotal').textContent = fmt(items[idx].qty * items[idx].price);
    }
  }
  calcTotals();
}

function addItem() {
  items.push({ id: Date.now(), name: '', place: '', qty: 1, price: '' });
  renderItems();
  calcTotals();
}

function removeItem(idx) {
  if (items.length === 1) { showToast('最低1行は必要です'); return; }
  items.splice(idx, 1);
  renderItems();
  calcTotals();
}

function calcTotals() {
  const total = items.reduce((s, i) => s + i.qty * i.price, 0);
  const base = Math.round(total / 1.1);
  const tax = total - base;
  const tSub = document.getElementById('t-sub');
  const tTax = document.getElementById('t-tax');
  const tGrand = document.getElementById('t-grand');
  const tLabel = document.getElementById('t-taxlabel');
  if (tSub) tSub.textContent = fmt(base);
  if (tTax) tTax.textContent = fmt(tax);
  if (tGrand) tGrand.textContent = fmt(total);
  if (tLabel) tLabel.textContent = '内消費税（10%）';
}


async function loadRemoteHistory(force = false) {
  if (!hasWebAppUrl()) return;
  if (historyLoading) return;
  if (!force && remoteEstimates.length > 0) return;
  historyLoading = true;
  historyError = '';
  if (currentTab === 'history') renderHistory();

  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000);
    const res = await fetch(WEB_APP_URL + '?mode=list', { signal: controller.signal, cache: 'no-store' });
    clearTimeout(timer);
    const data = await res.json();
    if (!data.ok) throw new Error(data.message || '履歴取得に失敗しました');
    remoteEstimates = Array.isArray(data.estimates) ? data.estimates : [];
    currentHistorySource = 'remote';
  } catch (error) {
    historyError = 'クラウド履歴を取得できませんでした。端末保存分を表示します。';
    remoteEstimates = [];
    currentHistorySource = 'local';
    console.error(error);
  } finally {
    historyLoading = false;
    updateHistoryBadge();
    if (currentTab === 'history') renderHistory();
  }
}

function normalizeLoadedEstimate(est) {
  const total = Number(est.grandTotal || est.grand_total || 0);
  return {
    ...est,
    id: est.id || Date.now(),
    date: est.date || est.saved_date || '',
    client: est.client || '',
    clientAddress: est.clientAddress || est.client_address || '',
    serviceClient: est.serviceClient || est.service_client || '',
    serviceAddress: est.serviceAddress || est.service_address || '',
    phone: est.phone || '',
    email: est.email || '',
    staff: est.staff || '',
    workDate: est.workDate || est.work_date || '',
    workTime: est.workTime || est.work_time || '',
    no: est.no || est.estimate_no || '',
    expiry: est.expiry || '',
    notes: est.notes || '',
    subtotal: Number(est.subtotal || 0),
    tax: Number(est.tax || 0),
    grandTotal: total,
    grand: est.grand || fmt(total),
    items: Array.isArray(est.items) ? est.items : []
  };
}

function getFormData() {
  return {
    client: (document.getElementById('client') || {}).value || '',
    clientAddress: (document.getElementById('clientAddress') || {}).value || '',
    serviceClient: (document.getElementById('serviceClient') || {}).value || '',
    serviceAddress: (document.getElementById('serviceAddress') || {}).value || '',
    phone: (document.getElementById('phone') || {}).value || '',
    email: (document.getElementById('email') || {}).value || '',
    staff: (document.getElementById('staff') || {}).value || '',
    workDate: (document.getElementById('workDate') || {}).value || '',
    workTime: (document.getElementById('workTime') || {}).value || '',
    expiry: (document.getElementById('expiry') || {}).value || '',
    notes: (document.getElementById('notes') || {}).value || '',
    grand: (document.getElementById('t-grand') || {}).textContent || '¥0',
  };
}

async function saveEstimate() {
  const d = getFormData();
  const total = items.reduce((s, i) => s + ((Number(i.qty) || 0) * (Number(i.price) || 0)), 0);
  const base = Math.round(total / 1.1);
  const tax = total - base;
  const recordId = editingRecordId || String(Date.now());
  const action = isEditingRemote() ? 'update' : 'save';

  const est = {
    id: recordId,
    action: action,
    date: new Date().toLocaleDateString('ja-JP'),
    items: JSON.parse(JSON.stringify(items)),
    subtotal: base,
    tax: tax,
    grandTotal: total,
    ...d
  };

  if (action === 'save') {
    estimates.unshift(est);
    currentHistorySource = 'local';
    try { localStorage.setItem('est_v2', JSON.stringify(estimates)); } catch(e) {}
    updateHistoryBadge();
  } else {
    const remoteIndex = remoteEstimates.findIndex(e => String(e.id) === String(recordId));
    if (remoteIndex >= 0) {
      remoteEstimates[remoteIndex] = { ...remoteEstimates[remoteIndex], ...est };
    }
  }

  if (!hasWebAppUrl()) {
    showToast(action === 'update' ? '更新内容は端末内にのみ保持されています。URL未設定です' : '端末保存のみ完了。URL未設定です');
    return;
  }

  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(est)
    });

    const data = await res.json();
    if (data.ok) {
      if (action === 'update') {
        showToast('クラウド履歴を更新しました');
        await loadRemoteHistory(true);
      } else {
        showToast('保存しました（スプレッドシート連携済み）');
      }
    } else {
      showToast(action === 'update' ? 'クラウド更新に失敗しました' : '端末保存のみ完了。シート保存失敗');
      console.error(data);
    }
  } catch (error) {
    showToast(action === 'update' ? 'クラウド更新に失敗しました' : '端末保存のみ完了。通信失敗');
    console.error(error);
  }
}

function loadEstimate(id) {
  const source = getActiveHistoryRecords();
  const found = source.find(e => String(e.id) === String(id));
  if (!found) return;
  editingRecordId = String(found.id || '');
  editingRecordSource = currentHistorySource === 'remote' ? 'remote' : 'local';
  const est = normalizeLoadedEstimate(found);
  items = (est.items || []).length ? est.items.map(i => ({
    id: Date.now() + Math.random(),
    name: i.name || '',
    place: i.place || '',
    qty: Number(i.qty) || 0,
    price: Number(i.price) || 0
  })) : [{ id: 1, name: '', place: '', qty: 1, price: '' }];

  switchTab('form');
  setTimeout(() => {
    if (document.getElementById('client')) {
      document.getElementById('client').value = est.client || '';
      document.getElementById('clientAddress').value = est.clientAddress || '';
      document.getElementById('serviceClient').value = est.serviceClient || '';
      document.getElementById('serviceAddress').value = est.serviceAddress || '';
      document.getElementById('phone').value = est.phone || '';
      updatePhoneLink();
      document.getElementById('email').value = est.email || '';
      document.getElementById('staff').value = est.staff || '';
      document.getElementById('workDate').value = est.workDate || '';
      document.getElementById('workTime').value = est.workTime || '';
      document.getElementById('expiry').value = est.expiry || '';
      document.getElementById('notes').value = est.notes || '';
      renderItems();
      calcTotals();
    }
  }, 50);
}


function handleHistoryOpen(ev, id) {
  if (ev) ev.stopPropagation();
  loadEstimate(String(id));
}

function handleHistoryDelete(ev, id) {
  if (ev) ev.stopPropagation();
  deleteEstimate(id);
}

function deleteEstimate(id) {
  if (!confirm('この見積を削除しますか？')) return;
  const targetId = String(id);
  estimates = estimates.filter(e => String(e.id) !== targetId);
  try { localStorage.setItem('est_v2', JSON.stringify(estimates)); } catch(e) {}
  renderHistory();
  updateHistoryBadge();
  showToast('端末保存データを削除しました');
}

function clearAllLocalEstimates() {
  if (!confirm('端末保存の履歴をすべて削除しますか？')) return;
  estimates = [];
  try { localStorage.removeItem('est_v2'); } catch(e) {}
  renderHistory();
  updateHistoryBadge();
  showToast('端末保存の履歴をすべて削除しました');
}

function updateHistoryBadge() {
  const localCount = estimates.length;
  const remoteCount = remoteEstimates.length;
  const n = currentHistorySource === 'remote' ? remoteCount : localCount;
  document.getElementById('tab-history-label').textContent = n > 0 ? `履歴 (${n})` : '履歴';
}


async function showCloudHistory() {
  if (!hasWebAppUrl()) {
    historyError = 'WebアプリURLが未設定です。';
    currentHistorySource = 'local';
    updateHistoryBadge();
    renderHistory();
    showToast('クラウド連携URLが未設定です');
    return;
  }
  currentHistorySource = 'remote';
  updateHistoryBadge();
  renderHistory();
  await loadRemoteHistory(true);
  if (remoteEstimates.length === 0 && historyError) {
    currentHistorySource = 'local';
    updateHistoryBadge();
    renderHistory();
  }
}

function renderHistory() {
  const c = document.getElementById('content');
  const rows = getActiveHistoryRecords();
  const isRemote = currentHistorySource === 'remote';

  if (historyLoading) {
    c.innerHTML = `
      <div class="history-tools">
        <button class="btn btn-secondary" onclick="currentHistorySource='local';renderHistory()">端末保存</button>
        <button class="btn btn-primary" disabled>クラウド読込中…</button>
      </div>
      <div class="empty">クラウド履歴を読み込んでいます</div>`;
    return;
  }

  const extraLocalAction = !isRemote && estimates.length ? '<button class="btn btn-secondary" onclick="clearAllLocalEstimates()">端末保存を全削除</button>' : '';
  const tools = `
    <div class="history-tools">
      <button class="btn ${isRemote ? 'btn-secondary' : 'btn-primary'}" onclick="currentHistorySource='local';updateHistoryBadge();renderHistory()">端末保存 (${estimates.length})</button>
      <button class="btn ${isRemote ? 'btn-primary' : 'btn-secondary'}" onclick="showCloudHistory()">クラウド履歴 (${remoteEstimates.length})</button>
    </div>
    ${extraLocalAction ? `<div class="history-tools">${extraLocalAction}</div>` : ''}
    <div class="history-note">クラウド履歴はボタンを押した時だけスプレッドシートから取得します。クリックで入力画面へ戻し、そのまま更新できます。</div>
    ${historyError ? `<div class="history-note">${escapeHtml(historyError)}</div>` : ''}
  `;

  if (rows.length === 0) {
    c.innerHTML = tools + '<div class="empty">保存された見積がありません</div>';
    return;
  }

  c.innerHTML = tools + rows.map(e => {
    const amount = fmt(e.grandTotal || e.grand_total || 0);
    const date = e.date || e.saved_date || '';
    const sourceChip = isRemote ? '<div class="status-chip">クラウド</div>' : '<div class="status-chip">端末</div>';
    const actionBtn = isRemote
      ? `<button class="btn-del-hist" onclick="handleHistoryOpen(event, '${escapeHtml(String(e.id))}')">開く</button>`
      : `<button class="btn-del-hist" onclick="handleHistoryDelete(event, '${escapeHtml(String(e.id))}')">削除</button>`;
    const savedAt = e.savedAt || e.timestamp || '';
    const updatedAt = e.updatedAt || '';
    const timeMeta = isRemote
      ? `保存: ${escapeHtml(savedAt || '未入力')} / 更新: ${escapeHtml(updatedAt || savedAt || '未入力')}`
      : `端末保存データ`;
    return `
      <div class="history-card" onclick="loadEstimate('${escapeHtml(String(e.id))}')">
        <div class="hc-left">
          ${sourceChip}
          <div class="client">${escapeHtml(e.client || '（ご契約お客様名なし）')}</div>
          <div class="date">${escapeHtml(date)}</div>
          <div class="history-meta">担当: ${escapeHtml(e.staff || '未入力')} / 作業日: ${escapeHtml(e.workDate || e.work_date || '未入力')}</div>
          <div class="history-meta">${timeMeta}</div>
        </div>
        <div class="hc-right">
          <div class="hc-amount">${amount}</div>
          ${actionBtn}
        </div>
      </div>`;
  }).join('');
}

function showToast(msg) {

  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
